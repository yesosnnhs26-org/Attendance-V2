<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAEUN6C1X2mXiHQ10fI51-ZODVA4tRC1OAhPEZglghLebuuCXC-q5WXA99Flr68IjMcQ/exec";

const codeReader = new ZXing.BrowserBarcodeReader();

const video = document.getElementById("video");
const result = document.getElementById("result");
const status = document.getElementById("status");

let scanning = true;
const SCAN_DELAY = 2000;

async function sendAttendance(officerID){

    try{

        const response = await fetch(SCRIPT_URL,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                officerID: officerID
            })

        });

        const data = await response.json();

        if(data.success){

            status.textContent = "✔ " + data.message;
            status.style.color = "#22c55e";

            result.textContent = data.name;

        }else{

            status.textContent = "❌ " + data.message;
            status.style.color = "#ef4444";

            if(data.name){
                result.textContent = data.name;
            }else{
                result.textContent = "---";
            }

        }

    }catch(err){

        console.error(err);

        status.textContent = "❌ Connection Error";
        status.style.color = "#ef4444";

    }

}

async function startScanner(){

    const devices = await codeReader.listVideoInputDevices();

    const selectedDevice = devices[0].deviceId;

    codeReader.decodeFromVideoDevice(
        selectedDevice,
        video,
        async(barcode, err)=>{

            if(barcode && scanning){

                scanning = false;

                result.textContent = barcode.text;

                result.classList.add("success");

                new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play();

                console.log(barcode.text);

                await sendAttendance(barcode.text);

                setTimeout(()=>{

                    result.textContent="---";

                    result.classList.remove("success");

                    status.textContent="Ready to Scan...";
                    status.style.color="#9ca3af";

                    scanning=true;

                },SCAN_DELAY);

            }

        }

    );

}

startScanner();

</script>
