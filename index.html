<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YES-O Barcode Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111827;
    font-family:Arial,Helvetica,sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    text-align:center;
}

h1{
    margin-bottom:20px;
}

video{
    width:100%;
    border-radius:15px;
    border:3px solid #16a34a;
}

#status{
    margin-top:20px;
    font-size:18px;
    color:#9ca3af;
    transition:.3s;
}

#result{
    margin-top:10px;
    font-size:30px;
    font-weight:bold;
    color:#22c55e;
    transition:.3s;
}

.success{
    transform:scale(1.12);
}

</style>

</head>
<body>

<div class="container">

<h1>YES-O Attendance Scanner</h1>

<video id="video"></video>

<div id="status">Ready to Scan...</div>

<div id="result">---</div>

</div>

<script>

const codeReader = new ZXing.BrowserBarcodeReader();

const video = document.getElementById("video");
const result = document.getElementById("result");
const status = document.getElementById("status");

let scanning = true;

const SCAN_DELAY = 2000;

async function startScanner(){

    const devices = await codeReader.listVideoInputDevices();

    const selectedDevice = devices[0].deviceId;

    codeReader.decodeFromVideoDevice(
        selectedDevice,
        video,
        (barcode, err)=>{

            if(barcode && scanning){

                scanning = false;

                result.textContent = barcode.text;

                result.classList.add("success");

                status.textContent = "✔ Attendance Recorded";
                status.style.color = "#22c55e";

                console.log(barcode.text);

                // Success sound
                new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play();

                // ===========================
                // GOOGLE SHEETS GOES HERE
                // sendAttendance(barcode.text);
                // ===========================

                setTimeout(()=>{

                    result.textContent="---";

                    result.classList.remove("success");

                    status.textContent="Ready to Scan...";
                    status.style.color="#9ca3af";

                    scanning=true;

                },SCAN_DELAY);

            }

        }

    );

}

startScanner();

</script>

</body>
</html>
