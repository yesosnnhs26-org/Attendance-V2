<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YES-O Attendance Scanner</title>
<script src="https://unpkg.com/@zxing/library@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#111827;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{width:420px;text-align:center;padding:20px}
h1{margin-bottom:20px}
select{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#1f2937;
color:#fff;
font-size:16px;
}
video{
width:100%;
border-radius:15px;
border:3px solid #16a34a;
background:#000;
}
#status{
margin-top:20px;
font-size:18px;
color:#9ca3af;
}
#result{
margin-top:12px;
font-size:28px;
font-weight:bold;
color:#22c55e;
}
.success{transform:scale(1.05)}
</style>
</head>
<body>

<div class="container">
<h1>YES-O Attendance Scanner</h1>

<select id="cameraSelect"></select>

<video id="video"></video>

<div id="status">Ready to Scan...</div>

<div id="result">---</div>
</div>

<script>

const WEB_APP_URL="https://yeso-attendance-api.yesosnnhs26.workers.dev/";

const codeReader=new ZXing.BrowserBarcodeReader();

const video=document.getElementById("video");
const result=document.getElementById("result");
const status=document.getElementById("status");
const cameraSelect=document.getElementById("cameraSelect");

let scanning=true;
const SCAN_DELAY=2000;

async function sendAttendance(officerID){

    try{

        const response=await fetch(SCRIPT_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                officerID
            })
        });

        const data=await response.json();

        if(data.success){

            status.textContent="✔ Attendance Recorded";
            status.style.color="#22c55e";

            result.innerHTML=`
            ${data.name}<br>
            <small style="font-size:18px">${data.officerID}</small>
            `;

        }else{

            status.textContent="❌ "+data.message;
            status.style.color="#ef4444";

            result.innerHTML=`
            ${data.name || "---"}<br>
            <small style="font-size:18px">${data.officerID || ""}</small>
            `;

        }

    }catch(err){

        console.error(err);

        status.textContent="❌ Connection Error";
        status.style.color="#ef4444";

    }

}

async function startScanner(){

    const devices=await codeReader.listVideoInputDevices();

    if(devices.length===0){

        status.textContent="No camera found.";
        status.style.color="#ef4444";
        return;

    }

    cameraSelect.innerHTML="";

    devices.forEach((device,index)=>{

        const option=document.createElement("option");

        option.value=device.deviceId;
        option.text=device.label || `Camera ${index+1}`;

        cameraSelect.appendChild(option);

    });

    const savedCamera=localStorage.getItem("yesoCamera");

    if(savedCamera && [...cameraSelect.options].some(o=>o.value===savedCamera)){
        cameraSelect.value=savedCamera;
    }

    async function startCamera(deviceId){

        codeReader.reset();

        codeReader.decodeFromVideoDevice(deviceId,video,async(resultData)=>{

            if(resultData && scanning){

                scanning=false;

                result.classList.add("success");

                try{
                    new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play();
                }catch(e){}

                await sendAttendance(resultData.text);

                setTimeout(()=>{

                    result.classList.remove("success");

                    status.textContent="Ready to Scan...";
                    status.style.color="#9ca3af";

                    scanning=true;

                },SCAN_DELAY);

            }

        });

    }

    await startCamera(cameraSelect.value);

    cameraSelect.onchange=async()=>{

        localStorage.setItem("yesoCamera",cameraSelect.value);

        await startCamera(cameraSelect.value);

    };

}

startScanner();

</script>

</body>
</html>
